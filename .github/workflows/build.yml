name: Build

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild lltimeme-ms/lltimeme.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "lltimeme.exe" |
                 Where-Object { $_.DirectoryName -match "Release" } |
                 Select-Object -First 1
          if (-not $exe) { throw "lltimeme.exe not found under Release/" }
          Copy-Item $exe.FullName "lltimeme.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: lltimeme.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          files: |
            windows-binary/lltimeme.exe

      - name: Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: windows-binary/lltimeme.exe
